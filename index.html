<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♟ Tournois d'Échecs — France</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #1A0F2E;
      --surface: #241540;
      --gold:    #F0B429;
      --gold-l:  #FFD96A;
      --ivory:   #F0EAF8;
      --muted:   #9A89B8;
      --border:  rgba(240,180,41,0.22);
      
      /* TES NOUVELLES COULEURS ICI ! */
      --blitz:   #7FC472; /* Vert vif pour le Blitz */
      --rapide:  #4ECDC4; /* Bleu pour le Rapide */
      --lente:   #F0B429; /* Doré pour la Lente */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--ivory);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(139,92,246,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 10%, rgba(236,72,153,0.18) 0%, transparent 45%),
        linear-gradient(135deg, #1A0F2E 0%, #0F1A3E 50%, #1A0F2E 100%);
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    header { position: relative; z-index: 10; text-align: center; padding: 3rem 1.5rem 1.5rem; border-bottom: 1px solid var(--border); }
    h1 {
      font-family: 'Playfair Display', Georgia, serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold-l) 0%, var(--gold) 45%, #9A6C20 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
    }
    .subtitle { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; }

    /* ── STATS BAR ── */
    .stats-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 2.5rem; padding: 1.2rem 1rem; border-bottom: 1px solid rgba(200,151,58,0.08); flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-top: 3px; }
    .stat-blitz  .stat-val { color: var(--blitz);  }
    .stat-rapide .stat-val { color: var(--rapide); }
    .stat-lente  .stat-val { color: var(--lente);  }

    /* ── CONTROLES ── */
    .controles { position: relative; z-index: 10; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 0.6rem; padding: 1rem 1.5rem; border-bottom: 1px solid rgba(200,151,58,0.08); }
    .sep { width: 1px; height: 24px; background: rgba(200,151,58,0.15); margin: 0 4px; }
    .search-wrap { position: relative; width: 100%; max-width: 260px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.8rem; }
    
    .recherche {
      width: 100%; padding: 8px 14px 8px 32px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,151,58,0.22); border-radius: 99px; color: var(--ivory);
      font-size: 0.78rem; outline: none; transition: border-color 0.2s;
    }
    .recherche:focus { border-color: var(--gold); }

    .filtre-btn {
      padding: 6px 14px; border-radius: 99px; border: 1px solid rgba(200,151,58,0.28);
      background: rgba(0,0,0,0.2); color: var(--muted); font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s;
    }
    .filtre-btn:hover { border-color: rgba(200,151,58,0.6); color: var(--ivory); }
    .filtre-btn.actif { background: rgba(200,151,58,0.14); border-color: var(--gold); color: var(--gold-l); }
    
    /* Boutons de couleurs modifiés pour le vert du blitz */
    .filtre-btn.actif.blitz  { background: rgba(127,196,114,0.12); border-color: rgba(127,196,114,0.6); color: var(--blitz); }
    .filtre-btn.actif.rapide { background: rgba(74,171,202,0.12); border-color: rgba(74,171,202,0.6); color: var(--rapide); }
    .filtre-btn.actif.lente  { background: rgba(240,180,41,0.12); border-color: rgba(240,180,41,0.6); color: var(--lente); }

    /* Bouton d'affichage Carte/Liste */
    #btn-vue { border-color: var(--gold); color: var(--gold); font-weight: 700; margin-left: 10px; }
    #btn-vue:hover { background: rgba(240,180,41,0.2); }
    
    /* Bouton de retour spécifique pour la vue Carte */
    #btn-retour-carte { 
        position: absolute; top: -60px; right: 2rem; border-color: var(--gold); 
        color: var(--gold); font-weight: 700; z-index: 1000;
    }
    #btn-retour-carte:hover { background: rgba(240,180,41,0.2); }

    /* ── ZONES D'AFFICHAGE ── */
    #calendrier { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
    
    /* Zone de la carte avec son conteneur pour le bouton de retour */
    #carte-france-controles { 
        display: none; position: relative; width: calc(100% - 2rem); max-width: 1200px; 
        margin: 7rem auto 2rem;
    }
    
    #carte-france { 
        width: 100%; height: 600px; border-radius: 12px; 
        border: 1px solid rgba(200,151,58,0.3); z-index: 1;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* ── CARTE TOURNOI AVEC PION GRAPHIQUE ── */
    .carte {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      display: flex; flex-direction: column; cursor: pointer;
      position: relative; transition: 0.22s; overflow: hidden;
    }
    
    /* LE PION GRAPHIQUE DÉCORATIF EN HAUT */
    .carte-logo-pion {
        height: 60px; width: 100%; position: relative;
        background: radial-gradient(circle at center, rgba(139,92,246,0.15) 0%, transparent 80%);
        display: flex; align-items: center; justify-content: center;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .graphic-pion {
        font-size: 2.8rem; filter: drop-shadow(0 0 10px transparent);
        margin-top: -5px;
    }
    .carte.blitz .graphic-pion  { color: var(--blitz); filter: drop-shadow(0 0 10px rgba(127,196,114,0.4)); }
    .carte.rapide .graphic-pion { color: var(--rapide); filter: drop-shadow(0 0 10px rgba(78,205,196,0.4)); }
    .carte.lente .graphic-pion  { color: var(--lente); filter: drop-shadow(0 0 10px rgba(240,180,41,0.4)); }
    
    .carte:hover { background: rgba(139,92,246,0.15); transform: translateY(-3px); }
    
    /* Corps de la carte */
    .carte-body { padding: 1rem 1.25rem 1.1rem 1.25rem; }

    .carte-top { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .carte-date { font-family: 'Playfair Display', serif; font-size: 0.78rem; font-weight: 700; color: var(--muted); }
    
    .badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; border: 1px solid; }
    .badge.blitz  { color: var(--blitz); border-color: rgba(127,196,114,0.45); background: rgba(127,196,114,0.1); }
    .badge.rapide { color: var(--rapide); border-color: rgba(74,171,202,0.45); background: rgba(74,171,202,0.1); }
    .badge.lente  { color: var(--lente); border-color: rgba(240,180,41,0.45); background: rgba(240,180,41,0.1); }

    .carte-titre { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--ivory); }
    .carte-lieu { font-size: 0.73rem; color: var(--muted); margin-bottom: 0.75rem; }

    /* ── PANEL DÉTAIL ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 400; backdrop-filter: blur(3px); }
    .overlay.visible { display: block; }

    .panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 100vw);
      background: #150D28; border-left: 1px solid rgba(139,92,246,0.3); z-index: 500;
      display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s;
    }
    .panel.ouvert { transform: translateX(0); }
    .panel-header { padding: 1.25rem; border-bottom: 1px solid rgba(139,92,246,0.2); }
    .btn-fermer { background: transparent; border: 1px solid rgba(200,151,58,0.2); color: var(--muted); padding: 4px 10px; cursor: pointer; border-radius: 6px; float: right;}
    .panel-titre { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--ivory); margin: 20px 0 5px; }
    .panel-body { padding: 1.25rem; flex: 1; overflow-y: auto; }
    .info-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    .info-lbl { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 3px; }
    .info-val { color: var(--ivory); }
    .lien-ffe { display: block; text-align: center; padding: 10px; background: rgba(200,151,58,0.1); border-radius: 8px; color: var(--gold); text-decoration: none; margin: 1rem; }
    
    /* ── LE STYLE DU PION SUR LA CARTE ── */
    .pion-carte {
        width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid rgba(255,255,255,0.8); font-size: 18px; color: #000; font-weight: bold;
        transition: transform 0.2s;
    }
    .pion-carte:hover { transform: scale(1.2) translateY(-3px); z-index: 1000 !important; }

  </style>
</head>
<body>

<header>
  <span class="header-piece" style="font-size:3.2rem;display:block;margin-bottom:0.4rem;filter:drop-shadow(0 0 20px rgba(200,151,58,0.4)); animation:float 4s ease-in-out infinite;">♟</span>
  <h1>Tournois d'Échecs</h1>
  <p class="subtitle">France · Calendrier FFE · À venir</p>
</header>

<div class="stats-bar">
  <div class="stat stat-blitz"><div class="stat-val" id="stat-blitz">—</div><div class="stat-lbl">⚡ Blitz</div></div>
  <div class="stat stat-rapide"><div class="stat-val" id="stat-rapide">—</div><div class="stat-lbl">🕐 Rapide</div></div>
  <div class="stat stat-lente"><div class="stat-val" id="stat-lente">—</div><div class="stat-lbl">♟ Lente</div></div>
</div>

<div class="controles">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="barre-recherche" class="recherche" placeholder="Ville, département…" oninput="chercherTexte()">
  </div>
  <div class="sep"></div>
  <button class="filtre-btn actif" onclick="changerCadence('tout', this)">Toutes</button>
  <button class="filtre-btn blitz" onclick="changerCadence('blitz', this)">⚡ Blitz</button>
  <button class="filtre-btn rapide" onclick="changerCadence('rapide', this)">🕐 Rapide</button>
  <button class="filtre-btn lente" onclick="changerCadence('lente', this)">♟ Lente</button>
  
  <div class="sep"></div>
  <button class="filtre-btn" id="btn-vue" onclick="basculerVue()">🗺️ Vue Carte</button>
</div>

<div id="calendrier"></div>

<div id="carte-france-controles">
    <button class="filtre-btn" id="btn-retour-carte" onclick="basculerVue()">↩️ Retour à la Liste</button>
    <div id="carte-france"></div>
</div>

<div class="overlay" id="overlay" onclick="fermerPanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <button class="btn-fermer" onclick="fermerPanel()">✕ Fermer</button>
    <div id="panel-badge" style="margin-top: 5px;"></div>
    <h2 class="panel-titre" id="panel-titre"></h2>
    <div style="color:var(--muted); font-size:0.8rem;" id="panel-meta"></div>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <a href="#" class="lien-ffe" id="panel-lien" target="_blank">Voir la fiche sur echecs.asso.fr ↗</a>
</div>

<script>
  /* J'ai mis à jour la couleur Hexadecimale ici aussi ! */
  const CADENCE_COLORS = { blitz:'#7FC472', rapide:'#4ECDC4', lente:'#F0B429' };
  let tousLesTournois = [];
  let cadenceActuelle = 'tout';
  let texteActuel = '';
  
  let modeCarte = false;
  let maCarteLeaflet = null;
  let groupePions = null;

  function fmtDate(s) {
    const d = new Date(s + 'T12:00:00');
    return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  }

  function detecterCadence(t) {
    const titre = (t.titre || '').toLowerCase();
    if (titre.includes('blitz')) return 'blitz';
    if (titre.includes('rapide')) return 'rapide';
    return 'lente';
  }

  fetch('calendrier.json')
    .then(r => r.json())
    .then(data => {
      tousLesTournois = data.map(t => ({ ...t, cadence: detecterCadence(t) }));
      appliquerFiltres();
    });

  function changerCadence(c, btn) {
    cadenceActuelle = c;
    document.querySelectorAll('.filtre-btn:not(#btn-vue):not(#btn-retour-carte)').forEach(b => b.classList.remove('actif'));
    btn.classList.add('actif');
    appliquerFiltres();
  }

  function chercherTexte() {
    texteActuel = document.getElementById('barre-recherche').value.toLowerCase();
    appliquerFiltres();
  }

  function appliquerFiltres() {
    const today = new Date(); today.setHours(0,0,0,0);
    let liste = tousLesTournois.filter(t => new Date(t.date) >= today);

    if (cadenceActuelle !== 'tout') liste = liste.filter(t => t.cadence === cadenceActuelle);
    if (texteActuel.trim()) {
      liste = liste.filter(t => (t.lieu || '').toLowerCase().includes(texteActuel) || (t.titre || '').toLowerCase().includes(texteActuel));
    }

    liste.sort((a,b) => new Date(a.date) - new Date(b.date));
    
    document.getElementById('stat-blitz').textContent = liste.filter(t => t.cadence === 'blitz').length;
    document.getElementById('stat-rapide').textContent = liste.filter(t => t.cadence === 'rapide').length;
    document.getElementById('stat-lente').textContent = liste.filter(t => t.cadence === 'lente').length;

    if (modeCarte) {
        afficherSurCarte(liste);
    } else {
        afficherGrille(liste);
    }
  }

  function basculerVue() {
      modeCarte = !modeCarte;
      const grille = document.getElementById('calendrier');
      const zoneCarte = document.getElementById('carte-france-controles');
      const controlesListe = document.querySelector('.controles');
      
      if (modeCarte) {
          grille.style.display = 'none';
          zoneCarte.style.display = 'block';
          
          controlesListe.style.opacity = '0';
          controlesListe.style.pointerEvents = 'none';
          
          if (!maCarteLeaflet) {
              maCarteLeaflet = L.map('carte-france').setView([46.603354, 1.888334], 6);
              L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                  attribution: '© OpenStreetMap contributors © CARTO'
              }).addTo(maCarteLeaflet);
              groupePions = L.layerGroup().addTo(maCarteLeaflet);
          }
          setTimeout(() => maCarteLeaflet.invalidateSize(), 100);
          appliquerFiltres();
      } else {
          zoneCarte.style.display = 'none';
          grille.style.display = 'grid';
          controlesListe.style.opacity = '1';
          controlesListe.style.pointerEvents = 'auto';
          appliquerFiltres();
      }
  }

  function afficherSurCarte(liste) {
      if(!groupePions) return;
      groupePions.clearLayers(); 

      liste.forEach(t => {
          if(!t.lieu) return;

          if (t.coords === undefined) {
              let nomVille = t.lieu.replace(/^\d+\s*-\s*/, '');
              fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(nomVille)}&type=municipality&limit=1`)
                  .then(r => r.json())
                  .then(res => {
                      if (res.features && res.features.length > 0) {
                          let gps = res.features[0].geometry.coordinates;
                          t.coords = [gps[1], gps[0]];
                          placerUnPion(t);
                      } else {
                          t.coords = false;
                      }
                  }).catch(() => t.coords = false);
          } else if (t.coords) {
              placerUnPion(t);
          }
      });
  }

  function placerUnPion(t) {
      const couleur = CADENCE_COLORS[t.cadence];
      const iconeEchecs = L.divIcon({
          className: 'custom-icon',
          html: `<div class="pion-carte" style="background-color: ${couleur}; box-shadow: 0 0 10px ${couleur};">♟</div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16]
      });

      L.marker(t.coords, {icon: iconeEchecs})
       .addTo(groupePions)
       .on('click', () => ouvrirPanel(t));
  }

  function afficherGrille(liste) {
    const conteneur = document.getElementById('calendrier');
    conteneur.innerHTML = '';
    
    if (!liste.length) {
      conteneur.innerHTML = `<div class="vide" style="grid-column: 1 / -1; text-align: center; padding: 4rem 1rem; color: var(--muted);">♟ Aucun tournoi à venir ne correspond.</div>`;
      return;
    }
    
    liste.forEach((t) => {
      const c = t.cadence;
      const dateFormatee = fmtDate(t.date);
      
      const carte = document.createElement('div');
      carte.className = `carte ${c}`;
      carte.onclick = () => ouvrirPanel(t);
      
      carte.innerHTML = `
        <div class="carte-logo-pion">
            <span class="graphic-pion">♟</span>
        </div>
        <div class="carte-body">
            <div class="carte-top">
              <div class="carte-date">${dateFormatee}</div>
              <span class="badge ${c}">${c.toUpperCase()}</span>
            </div>
            <div class="carte-titre">${t.titre}</div>
            <div class="carte-lieu">📍 ${t.lieu || 'Lieu non précisé'}</div>
        </div>
      `;
      conteneur.appendChild(carte);
    });
  }

  function ouvrirPanel(t) {
    const c = t.cadence;
    document.getElementById('panel-badge').innerHTML = `<span class="badge ${c}">${c.toUpperCase()}</span>`;
    document.getElementById('panel-titre').textContent = t.titre;
    document.getElementById('panel-meta').textContent = fmtDate(t.date);
    
    let infosHtml = '';
    if(t.lieu) infosHtml += `<div class="info-row"><div class="info-lbl">📍 Lieu du tournoi</div><div class="info-val">${t.lieu}</div></div>`;
    if(t.arbitre) infosHtml += `<div class="info-row"><div class="info-lbl">👤 Arbitre</div><div class="info-val">${t.arbitre}</div></div>`;
    
    document.getElementById('panel-body').innerHTML = infosHtml || 'Aucune info supp.';
    document.getElementById('panel-lien').href = t.url_source;

    document.getElementById('overlay').classList.add('visible');
    document.getElementById('panel').classList.add('ouvert');
  }

  function fermerPanel() {
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('panel').classList.remove('ouvert');
  }
</script>
</body>
</html>
