<html lang="fr">
<head>

  <title>♟ Tournois d'Échecs — France</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #1A0F2E; --surface: #241540; --gold: #F0B429; --gold-l: #FFD96A;
      --ivory: #F0EAF8; --muted: #9A89B8; --border: rgba(240,180,41,0.22);
      --blitz: #FF6B6B; --rapide: #4ECDC4; --lente: #95E77E;

    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--ivory); min-height: 100vh; overflow-x: hidden; }
    
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 15% 20%, rgba(139,92,246,0.25) 0%, transparent 50%),

                  linear-gradient(135deg, #1A0F2E 0%, #0F1A3E 50%, #1A0F2E 100%);
      pointer-events: none; z-index: -1;
    }

    /* ── LE RETOUR DES PIÈCES FLOTTANTES ! ── */
    @keyframes drift { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-30px) rotate(3deg); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    body::after {
      content: '♟ ♞ ♝ ♜ ♛ ♚ ♟ ♞ ♝ ♜';
      position: fixed; inset: 0; font-size: 2.5rem; color: rgba(255,255,255,0.04);
      display: flex; flex-wrap: wrap; align-content: space-around; justify-content: space-around;
      letter-spacing: 2rem; line-height: 4rem; pointer-events: none; z-index: 0;
      animation: drift 20s linear infinite;
    }

    header { position: relative; z-index: 1; text-align: center; padding: 3rem 1.5rem 1.5rem; border-bottom: 1px solid var(--border); }

    .subtitle { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; }

    .recherche:focus { border-color: var(--gold); }

    .filtre-btn { padding: 6px 14px; border-radius: 99px; border: 1px solid rgba(200,151,58,0.28); background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.18s; z-index: 2; position: relative; }

    .carte { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.1rem 1.15rem 1.1rem 1.35rem; display: flex; flex-direction: column; cursor: pointer; position: relative; transition: 0.22s; z-index: 2;}

    .carte.blitz::before { background: var(--blitz); } .carte.rapide::before { background: var(--rapide); } .carte.lente::before { background: var(--lente); }
    .carte:hover { background: rgba(139,92,246,0.15); transform: translateY(-3px); }

    .carte-top { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .carte-date { font-family: 'Playfair Display', serif; font-size: 0.78rem; font-weight: 700; color: var(--gold); }
    .badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; border: 1px solid; }
    .badge.blitz { color: var(--blitz); border-color: rgba(224,90,90,0.45); } .badge.rapide { color: var(--rapide); border-color: rgba(74,171,202,0.45); } .badge.lente { color: var(--lente); border-color: rgba(127,196,114,0.45); }
    .carte-titre { font-family: 'Playfair Display', serif; font-size: 0.96rem; font-weight: 700; margin-bottom: 0.6rem; }
    .carte-lieu { font-size: 0.73rem; color: var(--muted); margin-bottom: 0.75rem; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 400; backdrop-filter: blur(3px); }
    .overlay.visible { display: block; }
    .panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 100vw); background: #150D28; border-left: 1px solid rgba(139,92,246,0.3); z-index: 500; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s; }
    .panel.ouvert { transform: translateX(0); }
    .panel-header { padding: 1.25rem; border-bottom: 1px solid rgba(139,92,246,0.2); }
    .btn-fermer { background: transparent; border: 1px solid rgba(200,151,58,0.2); color: var(--muted); padding: 4px 10px; cursor: pointer; border-radius: 6px; float: right;}
    .panel-titre { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--ivory); margin: 20px 0 5px; }
    .panel-body { padding: 1.25rem; flex: 1; overflow-y: auto; }
